<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>推文热点素材库</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    body { background-color: #020617; color: #f8fafc; font-family: 'Noto Sans SC', sans-serif; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1e293b; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }

    /* 热点卡片 */
    .hotspot-card {
      border: 1px solid #1e293b;
      border-radius: 10px;
      padding: 12px 14px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .hotspot-card:hover { border-color: #334155; background: rgba(255,255,255,0.02); }
    .hotspot-card.expanded { border-color: #334155; }

    /* 复选框模式 */
    .hotspot-card.select-mode { cursor: pointer; }
    .hotspot-card.select-mode.selected { border-color: #2563eb; background: rgba(37,99,235,0.08); }
    .check-indicator {
      width: 16px; height: 16px; border-radius: 4px;
      border: 1.5px solid #475569; background: transparent;
      position: relative; flex-shrink: 0;
      transition: all 0.15s; display: none;
    }
    .select-mode .check-indicator { display: block; }
    .check-indicator::after {
      content: ''; display: none; position: absolute;
      left: 4px; top: 1px; width: 5px; height: 9px;
      border: 2px solid white; border-top: none; border-left: none;
      transform: rotate(45deg);
    }
    .selected .check-indicator { background: #2563eb; border-color: #2563eb; }
    .selected .check-indicator::after { display: block; }

    /* source badge */
    .source-badge { font-size: 10px; padding: 1px 6px; border-radius: 4px; border: 1px solid; display: inline-block; white-space: nowrap; }
    .badge-douyin { color: #f0abfc; border-color: #d946ef; background: rgba(217,70,239,0.08); }
    .badge-reddit { color: #f87171; border-color: #f87171; background: rgba(248,113,113,0.08); }
    .badge-v2ex   { color: #86efac; border-color: #4ade80; background: rgba(74,222,128,0.08); }
    .badge-hn     { color: #fdba74; border-color: #fb923c; background: rgba(251,146,60,0.08); }

    /* 展开详情 */
    .card-detail { display: none; margin-top: 8px; padding-top: 8px; border-top: 1px solid #1e293b; }
    .hotspot-card.expanded .card-detail { display: block; }

    /* tag 输入 */
    .topic-tag {
      display: inline-flex; align-items: center; gap: 4px;
      background: rgba(37,99,235,0.2); border: 1px solid #2563eb;
      border-radius: 6px; padding: 2px 8px; font-size: 12px; color: #93c5fd;
    }
    .topic-tag button { color: #60a5fa; font-size: 14px; line-height: 1; cursor: pointer; background: none; border: none; }
    .topic-tag button:hover { color: #f87171; }

    /* 右侧灵感卡片 */
    .insight-group-title { font-size: 12px; color: #64748b; font-weight: 500; margin: 12px 0 6px; letter-spacing: 0.05em; }
    .insight-group-title:first-child { margin-top: 0; }
    .insight-card { border: 1px solid #1e293b; border-radius: 10px; overflow: hidden; margin-bottom: 6px; }
    .insight-header { cursor: pointer; padding: 10px 12px; display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; transition: background 0.15s; }
    .insight-header:hover { background: rgba(255,255,255,0.03); }
    .insight-angle { font-size: 13px; color: #e2e8f0; flex: 1; line-height: 1.5; }
    .insight-arrow { color: #475569; font-size: 10px; transition: transform 0.2s; flex-shrink: 0; margin-top: 3px; }
    .insight-card.open .insight-arrow { transform: rotate(90deg); }
    .insight-body { display: none; padding: 8px 12px 10px; border-top: 1px solid #0f172a; }
    .insight-card.open .insight-body { display: block; }
    .insight-hot { font-size: 11px; color: #f97316; margin-bottom: 4px; }
    .insight-summary { font-size: 11px; color: #64748b; line-height: 1.6; }

    /* 弹窗 */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center; z-index: 50;
    }
    .modal-box {
      background: #0f172a; border: 1px solid #334155; border-radius: 16px;
      padding: 24px; width: 90%; max-width: 480px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 1s linear infinite; }
  </style>
</head>
<body class="min-h-screen">

  <!-- 顶部导航 -->
  <header class="sticky top-0 z-30 border-b border-slate-800/80 bg-slate-950/90 backdrop-blur-md">
    <div class="max-w-5xl mx-auto px-4 h-14 flex items-center gap-3">
      <div class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center shrink-0">
        <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
        </svg>
      </div>
      <h1 class="text-slate-100 font-semibold text-base">推文热点素材库</h1>
      <span class="text-slate-500 text-xs ml-auto">by @Jacky_cufe</span>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-4 py-8 space-y-6">

    <!-- 搜索区 -->
    <div class="bg-slate-900/60 border border-slate-700/50 rounded-2xl p-6">
      <div class="flex gap-3">
        <input
          id="keyword"
          type="text"
          placeholder="输入关键词，例如：AI、副业、微服务……"
          class="flex-1 bg-slate-800 border border-slate-600 rounded-xl px-4 py-3 text-slate-100
                 placeholder-slate-500 text-sm outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
        />
        <button
          id="search-btn"
          onclick="searchHotspots()"
          class="px-6 py-3 rounded-xl bg-slate-700 hover:bg-slate-600 text-white font-medium text-sm
                 transition-colors flex items-center gap-2 shrink-0"
        >
          <svg id="search-icon" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
          <span id="search-text">搜索热点</span>
        </button>
      </div>
    </div>

    <!-- 两栏区域 -->
    <div id="result-section" class="hidden">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 items-start">

        <!-- 左栏：热点列表 -->
        <div class="bg-slate-900/60 border border-slate-700/50 rounded-2xl p-6 space-y-4">
          <div class="flex items-center justify-between">
            <h2 class="text-slate-300 text-sm font-medium flex items-center gap-2">
              <svg class="w-4 h-4 text-orange-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M17.657 18.657A8 8 0 016.343 7.343S7 9 9 10c0-2 .5-5 2.986-7C14 5 16.09 5.777 17.656 7.343A7.975 7.975 0 0120 13a7.975 7.975 0 01-2.343 5.657z" />
              </svg>
              相关热点
            </h2>
            <span id="select-hint" class="text-slate-600 text-xs">点击卡片查看详情</span>
          </div>

          <div id="hotspot-list" class="space-y-2"></div>

          <!-- 底部操作区 -->
          <div id="action-bar" class="pt-2 border-t border-slate-800 space-y-2">
            <!-- 普通模式 -->
            <div id="normal-actions">
              <button
                onclick="enterSelectMode()"
                class="w-full py-2.5 rounded-xl border border-slate-600 hover:border-blue-500 hover:text-blue-400
                       text-slate-400 font-medium text-sm transition-colors flex items-center justify-center gap-2"
              >
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
                </svg>
                选择素材生成推文
              </button>
            </div>
            <!-- 选择模式 -->
            <div id="select-actions" class="hidden space-y-2">
              <div class="flex items-center justify-between text-xs text-slate-500">
                <span id="select-count">已选 0 条</span>
                <button onclick="exitSelectMode()" class="text-slate-600 hover:text-slate-400">取消</button>
              </div>
              <button
                id="generate-btn"
                onclick="openModal()"
                disabled
                class="w-full py-2.5 rounded-xl bg-blue-600 hover:bg-blue-500
                       disabled:opacity-40 disabled:cursor-not-allowed
                       text-white font-medium text-sm transition-colors flex items-center justify-center gap-2"
              >
                <svg id="gen-icon" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
                </svg>
                <span id="gen-text">生成推文灵感</span>
              </button>
            </div>
          </div>
        </div>

        <!-- 右栏：推文灵感 -->
        <div class="bg-slate-900/60 border border-slate-700/50 rounded-2xl p-6 space-y-4">
          <h2 class="text-slate-300 text-sm font-medium flex items-center gap-2">
            <svg class="w-4 h-4 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" />
            </svg>
            推文灵感
          </h2>
          <div id="insights-content">
            <p class="text-slate-600 text-sm text-center py-10">← 选择热点素材后点击生成</p>
          </div>
          <div class="pt-2 border-t border-slate-700/50">
            <p class="text-slate-500 text-xs">💡 灵感仅供参考，内容要结合你的真实经历来写</p>
          </div>
        </div>

      </div>
    </div>

    <!-- 错误提示 -->
    <div id="error-section" class="hidden bg-red-950/60 border border-red-800/60 rounded-2xl p-4">
      <p id="error-msg" class="text-red-300 text-sm"></p>
    </div>

  </main>

  <footer class="mt-16 border-t border-slate-800/60 py-6">
    <p class="text-center text-slate-600 text-xs">
      推文热点素材库 · Made by <a href="https://x.com/Jacky_cufe" target="_blank" class="text-blue-500 hover:text-blue-400">@Jacky_cufe</a>
    </p>
  </footer>

  <!-- 切入主题弹窗 -->
  <div id="modal" class="modal-overlay hidden">
    <div class="modal-box space-y-4">
      <h3 class="text-slate-200 font-medium">设置切入主题</h3>
      <p class="text-slate-500 text-xs">输入主题后回车添加，支持多个主题同时生成</p>

      <!-- tag 展示区 -->
      <div id="topic-tags" class="flex flex-wrap gap-2 min-h-8"></div>

      <!-- 输入框 -->
      <input
        id="topic-input"
        type="text"
        placeholder="例如：AI焦虑、职场提效……回车添加"
        class="w-full bg-slate-800 border border-slate-600 rounded-xl px-4 py-3 text-slate-100
               placeholder-slate-500 text-sm outline-none focus:border-blue-500"
      />

      <div class="flex gap-3 pt-1">
        <button
          onclick="closeModal()"
          class="flex-1 py-2.5 rounded-xl border border-slate-600 text-slate-400 text-sm hover:border-slate-500 transition-colors"
        >
          取消
        </button>
        <button
          id="confirm-btn"
          onclick="confirmGenerate()"
          class="flex-1 py-2.5 rounded-xl bg-blue-600 hover:bg-blue-500 text-white text-sm font-medium transition-colors"
        >
          生成
        </button>
      </div>
    </div>
  </div>

  <script>
    let allResults = [];
    let selectedIndexes = new Set();
    let inSelectMode = false;
    let topics = [];

    function badgeClass(source) {
      if (source === '抖音热搜') return 'badge-douyin';
      if (source === 'Reddit') return 'badge-reddit';
      if (source === 'V2EX') return 'badge-v2ex';
      if (source === 'Hacker News') return 'badge-hn';
      return 'badge-hn';
    }

    function renderHotspots() {
      const el = document.getElementById('hotspot-list');
      el.innerHTML = allResults.map((item, idx) => `
        <div
          id="card-${idx}"
          class="hotspot-card ${inSelectMode ? 'select-mode' : ''} ${selectedIndexes.has(idx) ? 'selected' : ''}"
          onclick="${inSelectMode ? `toggleSelect(${idx})` : `toggleExpand(${idx})`}"
        >
          <div class="flex items-start gap-3">
            <div class="check-indicator"></div>
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2 mb-1 flex-wrap">
                <span class="source-badge ${badgeClass(item.source)}">${item.source}</span>
                ${item.views ? `<span class="text-slate-500 text-xs">🔥 ${item.views}</span>` : ''}
                ${item.comments ? `<span class="text-slate-500 text-xs">💬 ${item.comments}</span>` : ''}
                ${item.subreddit ? `<span class="text-slate-600 text-xs">${item.subreddit}</span>` : ''}
              </div>
              <p class="text-slate-200 text-sm leading-snug">${item.title}</p>
              <div class="card-detail">
                ${item.url ? `<a href="${item.url}" target="_blank" onclick="event.stopPropagation()"
                  class="text-blue-500 hover:text-blue-400 text-xs">查看原帖 →</a>` : ''}
              </div>
            </div>
          </div>
        </div>
      `).join('');
    }

    function toggleExpand(idx) {
      const card = document.getElementById(`card-${idx}`);
      card.classList.toggle('expanded');
    }

    function toggleSelect(idx) {
      if (selectedIndexes.has(idx)) {
        selectedIndexes.delete(idx);
      } else {
        selectedIndexes.add(idx);
      }
      document.getElementById('select-count').textContent = `已选 ${selectedIndexes.size} 条`;
      document.getElementById('generate-btn').disabled = selectedIndexes.size === 0;
      renderHotspots();
    }

    function enterSelectMode() {
      inSelectMode = true;
      selectedIndexes.clear();
      document.getElementById('normal-actions').classList.add('hidden');
      document.getElementById('select-actions').classList.remove('hidden');
      document.getElementById('select-hint').textContent = '点击卡片选择素材';
      document.getElementById('select-count').textContent = '已选 0 条';
      document.getElementById('generate-btn').disabled = true;
      renderHotspots();
    }

    function exitSelectMode() {
      inSelectMode = false;
      selectedIndexes.clear();
      document.getElementById('normal-actions').classList.remove('hidden');
      document.getElementById('select-actions').classList.add('hidden');
      document.getElementById('select-hint').textContent = '点击卡片查看详情';
      renderHotspots();
    }

    // ── 弹窗 ──────────────────────────────────────────────────────────────────

    function openModal() {
      topics = [];
      renderTopicTags();
      document.getElementById('topic-input').value = '';
      document.getElementById('modal').classList.remove('hidden');
      setTimeout(() => document.getElementById('topic-input').focus(), 50);
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
    }

    function renderTopicTags() {
      const el = document.getElementById('topic-tags');
      el.innerHTML = topics.map((t, i) => `
        <span class="topic-tag">
          ${t}
          <button onclick="removeTopic(${i})">×</button>
        </span>
      `).join('');
    }

    function removeTopic(i) {
      topics.splice(i, 1);
      renderTopicTags();
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('topic-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') {
          const val = e.target.value.trim();
          if (val && !topics.includes(val)) {
            topics.push(val);
            renderTopicTags();
          }
          e.target.value = '';
        }
      });

      document.getElementById('keyword').addEventListener('keydown', e => {
        if (e.key === 'Enter') searchHotspots();
      });

      // 点弹窗外关闭
      document.getElementById('modal').addEventListener('click', e => {
        if (e.target === document.getElementById('modal')) closeModal();
      });
    });

    async function confirmGenerate() {
      // 把输入框里未回车的内容也加进来
      const inputVal = document.getElementById('topic-input').value.trim();
      if (inputVal && !topics.includes(inputVal)) topics.push(inputVal);

      if (!topics.length) { alert('请至少输入一个切入主题'); return; }

      closeModal();

      const selectedItems = [...selectedIndexes].map(i => allResults[i]);
      const btn = document.getElementById('confirm-btn');
      document.getElementById('insights-content').innerHTML =
        '<p class="text-slate-500 text-sm text-center py-10">AI 生成中，请稍候…</p>';

      try {
        const res = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ selectedItems, topics })
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error);

        document.getElementById('insights-content').innerHTML = renderInsightCards(data.insights);
        exitSelectMode();
      } catch (e) {
        document.getElementById('insights-content').innerHTML =
          `<p class="text-red-400 text-sm">${e.message}</p>`;
      }
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function renderInsightCards(raw) {
      // 按 --- 分割成各个角度块
      const blocks = raw.split(/\n---\n/).map(b => b.trim()).filter(Boolean);
      if (!blocks.length) return `<p class="text-slate-500 text-sm text-center py-10">没有生成结果</p>`;

      // 按切入主题分组
      const groups = {};
      const groupOrder = [];

      blocks.forEach(block => {
        const topicMatch = block.match(/TOPIC:\s*(.+)/);
        const hotMatch = block.match(/HOT:\s*(.+)/);
        const summaryMatch = block.match(/SUMMARY:\s*(.+)/);
        const angleMatch = block.match(/ANGLE:\s*(.+)/);

        const topic = topicMatch?.[1]?.trim() || '切入角度';
        const hot = hotMatch?.[1]?.trim() || '';
        const summary = summaryMatch?.[1]?.trim() || '';
        const angle = angleMatch?.[1]?.trim() || '';

        if (!angle) return;
        if (!groups[topic]) { groups[topic] = []; groupOrder.push(topic); }
        groups[topic].push({ hot, summary, angle });
      });

      let html = '';
      groupOrder.forEach(topic => {
        html += `<div class="insight-group-title">${escapeHtml(topic)}</div>`;
        groups[topic].forEach((item, i) => {
          html += `
            <div class="insight-card" onclick="this.classList.toggle('open')">
              <div class="insight-header">
                <span class="insight-angle">✏️ ${escapeHtml(item.angle)}</span>
                <span class="insight-arrow">▸</span>
              </div>
              <div class="insight-body">
                ${item.hot ? `<div class="insight-hot">🔥 ${escapeHtml(item.hot)}</div>` : ''}
                ${item.summary ? `<div class="insight-summary">${escapeHtml(item.summary)}</div>` : ''}
              </div>
            </div>
          `;
        });
      });
      return html;
    }

    // ── 搜索 ──────────────────────────────────────────────────────────────────

    async function searchHotspots() {
      const keyword = document.getElementById('keyword').value.trim();
      if (!keyword) { alert('请输入关键词'); return; }

      const btn = document.getElementById('search-btn');
      const icon = document.getElementById('search-icon');
      const text = document.getElementById('search-text');
      btn.disabled = true;
      icon.classList.add('spinner');
      text.textContent = '搜索中…';

      document.getElementById('error-section').classList.add('hidden');
      document.getElementById('result-section').classList.add('hidden');
      inSelectMode = false;
      selectedIndexes.clear();

      try {
        const res = await fetch('/api/search', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ keyword })
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        if (!data.results?.length) throw new Error('未找到相关热点，换个关键词试试');

        allResults = data.results;
        document.getElementById('normal-actions').classList.remove('hidden');
        document.getElementById('select-actions').classList.add('hidden');
        document.getElementById('select-hint').textContent = '点击卡片查看详情';
        document.getElementById('insights-content').innerHTML =
          '<p class="text-slate-600 text-sm text-center py-10">← 选择热点素材后点击生成</p>';
        renderHotspots();
        document.getElementById('result-section').classList.remove('hidden');
      } catch (e) {
        document.getElementById('error-msg').textContent = e.message;
        document.getElementById('error-section').classList.remove('hidden');
      } finally {
        btn.disabled = false;
        icon.classList.remove('spinner');
        text.textContent = '搜索热点';
      }
    }
  </script>
</body>
</html>
